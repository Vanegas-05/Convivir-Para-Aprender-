<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Convivir Para Aprender</title>

<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

<style>
body {
    margin: 0;
    background: #0f172a;
    color: white;
    font-family: Arial;
    text-align: center;
}

/* LOGIN */
.login-container {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}

.login-box {
    background: #1e293b;
    padding: 30px;
    border-radius: 20px;
    width: 300px;
    box-shadow: 0px 0px 20px rgba(0,0,0,0.5);
}

.login-box h2 {
    margin-bottom: 20px;
}

.login-box input,
.login-box select {
    width: 90%;
    margin: 10px;
    padding: 10px;
    border-radius: 10px;
    border: none;
}

.login-box button {
    width: 95%;
    padding: 10px;
    background: #22c55e;
    color: white;
    border-radius: 10px;
    font-weight: bold;
    cursor: pointer;
}

/* GENERAL */
input, button, select {
    margin: 10px;
    padding: 10px;
    border-radius: 15px;
    border: none;
}

button {
    cursor: pointer;
}

/* OCULTAR */
#panelProfe, #panelEst {
    display: none;
}
</style>
</head>

<body>

<h1>Convivencia Entre Grupos</h1>

<!-- LOGIN -->
<div id="login" class="login-container">
    <div class="login-box">
        <h2>Iniciar Sesión</h2>

        <select id="rol">
            <option value="profesor">Profesor</option>
            <option value="estudiante">Estudiante</option>
        </select>

        <input id="user" placeholder="Usuario o nombre">
        <input id="pass" type="password" placeholder="Contraseña (profesor)">

        <button onclick="entrar()">Entrar</button>
        <button onclick="registrar()">Registrarse</button>
    </div>
</div>

<!-- PANEL PROFESOR -->
<div id="panelProfe">
    <h2>Panel Profesor</h2>

    <button onclick="crearJuego()">Crear Juego</button>
    <p id="codigo"></p>

    <input id="pregunta" placeholder="Pregunta">
    <input id="correcta" placeholder="Respuesta correcta">

    <select id="tipo">
        <option value="quiz">Quiz</option>
        <option value="vf">Verdadero/Falso</option>
        <option value="carta">Carta</option>
    </select>

    <input id="opciones" placeholder="op1,op2,op3">
    <input id="tiempo" placeholder="Tiempo (segundos)">

    <button onclick="agregarPregunta()">Agregar Pregunta</button>
    <button onclick="iniciarJuego()">Iniciar Juego</button>
    <button onclick="siguientePregunta()">Siguiente Pregunta</button>

    <h3>Jugadores en sala:</h3>
    <ul id="listaJugadores"></ul>
</div>

<!-- PANEL ESTUDIANTE -->
<div id="panelEst">
    <h2>Unirse a juego</h2>

    <input id="codigoEst" placeholder="Código del juego">
    <input id="nombre" placeholder="Nombre">

    <button onclick="unirse()">Unirse</button>

    <div id="juego"></div>
    <h3 id="puntaje"></h3>
</div>

<script src="app.js"></script>
</body>
</html>
